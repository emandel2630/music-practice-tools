<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Chord Trainer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: monospace;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            color: #a0c4ff;
            letter-spacing: 4px;
            margin-bottom: 14px;
            font-size: 2.8em;
        }

        #key-label {
            color: #888;
            font-size: 1.3em;
            margin-bottom: 10px;
            min-height: 1.4em;
        }

        #status {
            font-size: 1.6em;
            margin: 20px 0;
            color: #ffcc00;
            min-height: 1.5em;
            text-align: center;
        }

        #answer {
            font-size: 4.5em;
            color: #90ee90;
            display: none;
            margin: 8px 0 2px;
            letter-spacing: 6px;
        }

        #note-names {
            font-size: 1.1em;
            color: #5a9a7a;
            display: none;
            margin-bottom: 8px;
            letter-spacing: 3px;
            text-align: center;
        }

        .controls {
            color: #666;
            margin-top: 48px;
            font-size: 1.1em;
            display: flex;
            gap: 36px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: #666;
            font-family: monospace;
            font-size: 1.1em;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ctrl-btn:hover { color: #aaa; }

        .key {
            background: #333;
            padding: 2px 10px;
            border-radius: 3px;
            color: #bbb;
            border: 1px solid #555;
        }

        #settings-btn {
            position: fixed;
            top: 14px;
            right: 14px;
            background: #252540;
            color: #999;
            border: 1px solid #444;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.85em;
        }

        #settings-btn:hover { background: #353560; color: #ccc; }

        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 10;
        }

        #settings-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #16213e;
            border: 1px solid #445;
            border-radius: 8px;
            padding: 24px 28px;
            min-width: 520px;
            max-width: 94vw;
            max-height: 90vh;
            overflow-y: auto;
            z-index: 20;
        }

        #settings-panel h2 {
            color: #a0c4ff;
            margin-bottom: 20px;
            font-size: 1em;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .setting-group { margin-bottom: 18px; }

        .setting-group .lbl {
            color: #666;
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .pill-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .pill {
            background: #1e2a4a;
            color: #888;
            border: 1px solid #334;
            padding: 4px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.85em;
        }

        .pill:hover { background: #253060; color: #aaa; }

        .pill.on {
            background: #2a4a9a;
            color: #ddeeff;
            border-color: #4070cc;
        }

        .chord-type-row {
            display: none;
            margin-bottom: 10px;
            padding-left: 6px;
            border-left: 2px solid #2a3a5a;
        }

        .chord-type-row.size-active { display: block; }

        .type-row-label {
            color: #555;
            font-size: 0.7em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .scale-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }

        .scale-grid .pill {
            min-width: 46px;
            text-align: center;
            padding: 4px 8px;
        }

        .scale-footer {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 2px;
        }

        .mini-btn {
            background: none;
            color: #555;
            border: none;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.75em;
            padding: 0;
            text-decoration: underline;
        }

        .mini-btn:hover { color: #888; }

        #scale-hint { color: #4a6a9a; font-size: 0.75em; }

        .tempo-row {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .tempo-val {
            font-size: 2em;
            color: #a0c4ff;
            text-align: center;
            min-width: 44px;
            line-height: 1;
        }

        .tempo-unit {
            font-size: 0.45em;
            color: #555;
            display: block;
            letter-spacing: 1px;
        }

        #close-btn {
            margin-top: 18px;
            background: #252540;
            color: #999;
            border: 1px solid #444;
            padding: 5px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.85em;
        }

        #close-btn:hover { background: #353560; }

        #staff {
            display: none;
            margin: 10px auto 0;
            max-width: 420px;
            width: 92vw;
        }

        #staff svg {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }
        #midi-status {
            position: fixed; bottom: 14px; right: 14px;
            background: #252540; border: 1px solid #3a3a5c;
            color: #888; border-radius: 12px; padding: 4px 10px;
            font-size: 11px; font-family: monospace; z-index: 999;
            transition: color 0.3s, border-color 0.3s;
        }
        #midi-status.on { color: #a0c4ff; border-color: #a0c4ff; }
        #midi-status.err { color: #ff8080; border-color: #ff8080; }
    </style>
</head>

<body>
    <button id="settings-btn">&#9881; Settings</button>
    <div id="midi-status">MIDI: off</div>

    <div id="overlay"></div>
    <div id="settings-panel">
        <h2>Settings</h2>

        <div class="setting-group">
            <div class="lbl">Chord Size</div>
            <div class="pill-group" id="size-btns">
                <button class="pill" data-size="2">2-note</button>
                <button class="pill on" data-size="3">3-note</button>
                <button class="pill" data-size="4">4-note</button>
                <button class="pill" data-size="5">5-note</button>
            </div>
        </div>

        <div class="setting-group">
            <div class="lbl">Chord Types</div>

            <div class="chord-type-row" data-for-size="2" id="types-2">
                <div class="type-row-label">intervals</div>
                <div class="pill-group">
                    <button class="pill" data-chord="Minor 2nd">m2</button>
                    <button class="pill" data-chord="Major 2nd">M2</button>
                    <button class="pill" data-chord="Minor 3rd">m3</button>
                    <button class="pill" data-chord="Major 3rd">M3</button>
                    <button class="pill" data-chord="Perfect 4th">P4</button>
                    <button class="pill" data-chord="Tritone">A4</button>
                    <button class="pill" data-chord="Perfect 5th">P5</button>
                    <button class="pill" data-chord="Minor 6th">m6</button>
                    <button class="pill" data-chord="Major 6th">M6</button>
                    <button class="pill" data-chord="Minor 7th">m7</button>
                    <button class="pill" data-chord="Major 7th">M7</button>
                    <button class="pill" data-chord="Octave">P8</button>
                </div>
            </div>

            <div class="chord-type-row size-active" data-for-size="3" id="types-3">
                <div class="type-row-label">triads</div>
                <div class="pill-group">
                    <button class="pill on" data-chord="Major">Major</button>
                    <button class="pill on" data-chord="Minor">Minor</button>
                    <button class="pill on" data-chord="Diminished">Dim</button>
                    <button class="pill on" data-chord="Augmented">Aug</button>
                </div>
            </div>

            <div class="chord-type-row" data-for-size="4" id="types-4">
                <div class="type-row-label">7ths</div>
                <div class="pill-group">
                    <button class="pill" data-chord="Major 7th">Maj7</button>
                    <button class="pill" data-chord="Dominant 7th">Dom7</button>
                    <button class="pill" data-chord="Minor 7th">Min7</button>
                    <button class="pill" data-chord="Minor-Major 7th">mMaj7</button>
                    <button class="pill" data-chord="Diminished 7th">Dim7</button>
                    <button class="pill" data-chord="Half-Diminished">&#248;7</button>
                </div>
            </div>

            <div class="chord-type-row" data-for-size="5" id="types-5">
                <div class="type-row-label">jazz extensions</div>
                <div class="pill-group">
                    <button class="pill" data-chord="Major 9th">Maj9</button>
                    <button class="pill" data-chord="Dominant 9th">Dom9</button>
                    <button class="pill" data-chord="Minor 9th">Min9</button>
                    <button class="pill" data-chord="Dom 7b9">7&#9837;9</button>
                    <button class="pill" data-chord="Dom 7#9">7&#9839;9</button>
                </div>
            </div>
        </div>

        <div class="setting-group">
            <div class="lbl">Voicing</div>
            <div class="pill-group" id="inv-btns">
                <button class="pill on" data-inv="root">Root only</button>
                <button class="pill" data-inv="inv">With inversions</button>
            </div>
        </div>

        <div class="setting-group">
            <div class="lbl">Playback</div>
            <div class="pill-group" id="play-btns">
                <button class="pill on" data-play="arp">Arpeggiate</button>
                <button class="pill" data-play="block">Block</button>
            </div>
        </div>

        <div class="setting-group">
            <div class="lbl">Keys</div>
            <div class="scale-grid" id="scale-grid"></div>
            <div class="scale-footer">
                <button class="mini-btn" id="select-all-btn">Select all</button>
                <button class="mini-btn" id="clear-btn">Clear</button>
                <span id="scale-hint"></span>
            </div>
        </div>

        <button id="close-btn">Close</button>
    </div>

    <h1>Chord Trainer</h1>
    <div id="key-label"></div>
    <div id="status">Begin</div>
    <div id="answer"></div>
    <div id="note-names"></div>
    <div id="staff"></div>

    <div class="controls">
        <button class="ctrl-btn" id="btn-replay"><span class="key">&#8592;</span> Replay</button>
        <button class="ctrl-btn" id="btn-advance"><span class="key">&#8594;</span> Answer / Next</button>
    </div>

    <div class="tempo-row" style="margin-top:40px">
        <svg id="tempo-knob" width="90" height="90" viewBox="-45 -45 90 90"
            style="cursor:grab;display:block;user-select:none">
            <circle r="32" fill="none" stroke="#252540" stroke-width="7" stroke-linecap="round"
                stroke-dasharray="150.80 201.06" transform="rotate(135)" />
            <circle id="knob-fill" r="32" fill="none" stroke="#2a4a9a" stroke-width="7" stroke-linecap="round"
                stroke-dasharray="56.55 201.06" transform="rotate(135)" />
            <line x1="-28.3" y1="28.3" x2="-24.7" y2="24.7" stroke="#445" stroke-width="1.5" stroke-linecap="round" />
            <line x1="-36.9" y1="-15.3" x2="-32.3" y2="-13.4" stroke="#445" stroke-width="1.5" stroke-linecap="round" />
            <line x1="0" y1="-40" x2="0" y2="-35" stroke="#445" stroke-width="1.5" stroke-linecap="round" />
            <line x1="36.9" y1="-15.3" x2="32.3" y2="-13.4" stroke="#445" stroke-width="1.5" stroke-linecap="round" />
            <line x1="28.3" y1="28.3" x2="24.7" y2="24.7" stroke="#445" stroke-width="1.5" stroke-linecap="round" />
            <circle r="26" fill="#1e2a4a" stroke="#334" stroke-width="1.5" />
            <g id="knob-indicator">
                <line x1="0" y1="-12" x2="0" y2="-22" stroke="#a0c4ff" stroke-width="2.5" stroke-linecap="round" />
                <circle cx="0" cy="-22" r="2" fill="#a0c4ff" />
            </g>
        </svg>
        <div class="tempo-val">
            <span id="tempo-bpm">100</span>
            <span class="tempo-unit">BPM</span>
        </div>
    </div>

    <script>
        // ── Chord database ──────────────────────────────────────────────────────
        const CHORDS = [
            { size: 2, name: 'Minor 2nd',       abbr: 'm2',    intervals: [0, 1]           },
            { size: 2, name: 'Major 2nd',        abbr: 'M2',    intervals: [0, 2]           },
            { size: 2, name: 'Minor 3rd',        abbr: 'm3',    intervals: [0, 3]           },
            { size: 2, name: 'Major 3rd',        abbr: 'M3',    intervals: [0, 4]           },
            { size: 2, name: 'Perfect 4th',      abbr: 'P4',    intervals: [0, 5]           },
            { size: 2, name: 'Tritone',          abbr: 'A4',    intervals: [0, 6]           },
            { size: 2, name: 'Perfect 5th',      abbr: 'P5',    intervals: [0, 7]           },
            { size: 2, name: 'Minor 6th',        abbr: 'm6',    intervals: [0, 8]           },
            { size: 2, name: 'Major 6th',        abbr: 'M6',    intervals: [0, 9]           },
            { size: 2, name: 'Minor 7th',        abbr: 'm7',    intervals: [0, 10]          },
            { size: 2, name: 'Major 7th',        abbr: 'M7',    intervals: [0, 11]          },
            { size: 2, name: 'Octave',           abbr: 'P8',    intervals: [0, 12]          },
            { size: 3, name: 'Major',            abbr: '',      intervals: [0, 4, 7]        },
            { size: 3, name: 'Minor',            abbr: 'm',     intervals: [0, 3, 7]        },
            { size: 3, name: 'Diminished',       abbr: '\u00b0',intervals: [0, 3, 6]        },
            { size: 3, name: 'Augmented',        abbr: '+',     intervals: [0, 4, 8]        },
            { size: 4, name: 'Major 7th',        abbr: 'maj7',  intervals: [0, 4, 7, 11]   },
            { size: 4, name: 'Dominant 7th',     abbr: '7',     intervals: [0, 4, 7, 10]   },
            { size: 4, name: 'Minor 7th',        abbr: 'm7',    intervals: [0, 3, 7, 10]   },
            { size: 4, name: 'Minor-Major 7th',  abbr: 'mMaj7', intervals: [0, 3, 7, 11]   },
            { size: 4, name: 'Diminished 7th',   abbr: '\u00b07',intervals: [0, 3, 6, 9]   },
            { size: 4, name: 'Half-Diminished',  abbr: '\u00f87',intervals: [0, 3, 6, 10]  },
            { size: 5, name: 'Major 9th',        abbr: 'maj9',  intervals: [0, 4, 7, 11, 14] },
            { size: 5, name: 'Dominant 9th',     abbr: '9',     intervals: [0, 4, 7, 10, 14] },
            { size: 5, name: 'Minor 9th',        abbr: 'm9',    intervals: [0, 3, 7, 10, 14] },
            { size: 5, name: 'Dom 7b9',          abbr: '7\u266d9', intervals: [0, 4, 7, 10, 13] },
            { size: 5, name: 'Dom 7#9',          abbr: '7\u266f9', intervals: [0, 4, 7, 10, 15] },
        ];

        // ── Scale data (verbatim from ear_trainer) ──────────────────────────────
        const SCALES = [
            { name: 'C',        root: 0,  sharps: 0, flats: 0, notes: ['C','D','E','F','G','A','B','C'] },
            { name: 'D&#9837;', root: 1,  sharps: 0, flats: 5, notes: ['D&#9837;','E&#9837;','F','G&#9837;','A&#9837;','B&#9837;','C','D&#9837;'] },
            { name: 'C&#9839;', root: 1,  sharps: 7, flats: 0, notes: ['C&#9839;','D&#9839;','E&#9839;','F&#9839;','G&#9839;','A&#9839;','B&#9839;','C&#9839;'] },
            { name: 'D',        root: 2,  sharps: 2, flats: 0, notes: ['D','E','F&#9839;','G','A','B','C&#9839;','D'] },
            { name: 'E&#9837;', root: 3,  sharps: 0, flats: 3, notes: ['E&#9837;','F','G','A&#9837;','B&#9837;','C','D','E&#9837;'] },
            { name: 'E',        root: 4,  sharps: 4, flats: 0, notes: ['E','F&#9839;','G&#9839;','A','B','C&#9839;','D&#9839;','E'] },
            { name: 'F',        root: 5,  sharps: 0, flats: 1, notes: ['F','G','A','B&#9837;','C','D','E','F'] },
            { name: 'G&#9837;', root: 6,  sharps: 0, flats: 6, notes: ['G&#9837;','A&#9837;','B&#9837;','C&#9837;','D&#9837;','E&#9837;','F','G&#9837;'] },
            { name: 'F&#9839;', root: 6,  sharps: 6, flats: 0, notes: ['F&#9839;','G&#9839;','A&#9839;','B','C&#9839;','D&#9839;','E&#9839;','F&#9839;'] },
            { name: 'G',        root: 7,  sharps: 1, flats: 0, notes: ['G','A','B','C','D','E','F&#9839;','G'] },
            { name: 'A&#9837;', root: 8,  sharps: 0, flats: 4, notes: ['A&#9837;','B&#9837;','C','D&#9837;','E&#9837;','F','G','A&#9837;'] },
            { name: 'A',        root: 9,  sharps: 3, flats: 0, notes: ['A','B','C&#9839;','D','E','F&#9839;','G&#9839;','A'] },
            { name: 'B&#9837;', root: 10, sharps: 0, flats: 2, notes: ['B&#9837;','C','D','E&#9837;','F','G','A','B&#9837;'] },
            { name: 'B',        root: 11, sharps: 5, flats: 0, notes: ['B','C&#9839;','D&#9839;','E','F&#9839;','G&#9839;','A&#9839;','B'] },
            { name: 'C&#9837;', root: 11, sharps: 0, flats: 7, notes: ['C&#9837;','D&#9837;','E&#9837;','F&#9837;','G&#9837;','A&#9837;','B&#9837;','C&#9837;'] },
        ];

        // ── State ───────────────────────────────────────────────────────────────
        const actx = new (window.AudioContext || window.webkitAudioContext)();
        const TEMPO_MIN = 40, TEMPO_MAX = 200;
        const KNOB_CIRC = 201.062, KNOB_ARC = 150.796;

        let selectedSizes  = new Set([3]);
        let selectedChords = new Set();
        let withInversions = false;
        let arpeggiate     = true;
        let selectedScales = new Set([SCALES[0]]);
        let tempo          = 100;

        let currentScale    = SCALES[0];
        let currentChord    = null;
        let currentRootMidi = 60;
        let currentInversion = 0;
        let currentMidi     = [];
        let hasStarted      = false;
        let answerShown     = false;
        let playing         = false;
        let activeOscs      = [];
        let playbackTimer   = null;

        // ── Staff notation constants (verbatim from ear_trainer) ────────────────
        const SHARP_SIG_POS = [8, 5, 9, 6, 3, 7, 4];
        const FLAT_SIG_POS  = [4, 7, 3, 6, 2, 5, 1];
        const SHARP_ORDER   = ['F','C','G','D','A','E','B'];
        const FLAT_ORDER    = ['B','E','A','D','G','C','F'];

        // ── Pitch-to-staff mapping ──────────────────────────────────────────────
        // Each row: [diatonicStep (0=C..6=B), letter, naturalPc]
        // Sharp spellings for each pc 0-11
        const PC_MAP_SHARP = [
            [0,'C',0],  [0,'C',0],  [1,'D',2],  [1,'D',2],  [2,'E',4],
            [3,'F',5],  [3,'F',5],  [4,'G',7],  [4,'G',7],  [5,'A',9],
            [5,'A',9],  [6,'B',11]
        ];
        // Flat spellings for each pc 0-11
        const PC_MAP_FLAT = [
            [0,'C',0],  [1,'D',2],  [1,'D',2],  [2,'E',4],  [2,'E',4],
            [3,'F',5],  [4,'G',7],  [4,'G',7],  [5,'A',9],  [5,'A',9],
            [6,'B',11], [6,'B',11]
        ];

        function midiFreq(midi) {
            return 261.63 * Math.pow(2, (midi - 60) / 12);
        }

        // Returns {pos, acc, letter} where pos is diatonic position (E4=0)
        function midiToStaff(midi, useFlats) {
            const semisFromC4 = midi - 60;
            const pc = ((semisFromC4 % 12) + 12) % 12;
            const octaveOffset = Math.floor(semisFromC4 / 12);
            const [diatonicStep, letter, naturalPc] = (useFlats ? PC_MAP_FLAT : PC_MAP_SHARP)[pc];
            // C4 is at pos -2 relative to E4=0
            const pos = (diatonicStep - 2) + octaveOffset * 7;
            const diff = pc - naturalPc;
            let acc = '';
            if (diff === 1 || diff === -11) acc = '#';
            else if (diff === -1 || diff === 11) acc = 'b';
            return { pos, acc, letter };
        }

        // Suppresses/adds accidentals based on current key signature
        function resolveAccidental(rawAcc, letter, scale) {
            const { sharps, flats } = scale;
            if (rawAcc === '#') {
                if (sharps > 0 && SHARP_ORDER.slice(0, sharps).includes(letter)) return '';
                return '#';
            }
            if (rawAcc === 'b') {
                if (flats > 0 && FLAT_ORDER.slice(0, flats).includes(letter)) return '';
                return 'b';
            }
            if (sharps > 0 && SHARP_ORDER.slice(0, sharps).includes(letter)) return 'n';
            if (flats  > 0 && FLAT_ORDER.slice(0, flats).includes(letter))   return 'n';
            return '';
        }

        function midiNoteName(midi, useFlats) {
            const { letter, acc } = midiToStaff(midi, useFlats);
            if (acc === '#') return letter + '&#9839;';
            if (acc === 'b') return letter + '&#9837;';
            return letter;
        }

        // ── Audio ───────────────────────────────────────────────────────────────
        function playNote(f, t, dur) {
            const osc = actx.createOscillator(), gain = actx.createGain();
            osc.connect(gain); gain.connect(actx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(f, t);
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.35, t + 0.015);
            gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
            osc.start(t); osc.stop(t + dur);
            activeOscs.push(osc);
            osc.onended = () => { activeOscs = activeOscs.filter(o => o !== osc); };
        }

        function stopAll() {
            clearTimeout(playbackTimer);
            playbackTimer = null;
            const now = actx.currentTime;
            activeOscs.forEach(o => { try { o.stop(now); } catch (e) {} });
            activeOscs = [];
            playing = false;
        }

        // ── Chord logic ─────────────────────────────────────────────────────────
        function invertChord(intervals, n) {
            let inv = [...intervals];
            for (let i = 0; i < n; i++) inv.push(inv.shift() + 12);
            return inv;
        }

        function pickChord() {
            if (selectedChords.size === 0) return false;
            // Pick scale
            const sPool = [...selectedScales];
            currentScale = sPool[Math.floor(Math.random() * sPool.length)];
            // Pick chord
            const cPool = [...selectedChords];
            currentChord = cPool[Math.floor(Math.random() * cPool.length)];
            // Root MIDI: put root in comfortable range (A3–A4 area)
            let rootMidi = 60 + currentScale.root;
            if (rootMidi > 69) rootMidi -= 12; // bring down if above A4
            currentRootMidi = rootMidi;
            // Inversion
            const maxInv = withInversions ? currentChord.intervals.length - 1 : 0;
            currentInversion = Math.floor(Math.random() * (maxInv + 1));
            const invIntervals = invertChord(currentChord.intervals, currentInversion);
            currentMidi = invIntervals.map(s => rootMidi + s);
            return true;
        }

        // Step-wise arpeggio (tempo-responsive)
        function stepArp(phase) {
            if (phase >= currentMidi.length) {
                const dur = (60 / tempo) * 1.2;
                playbackTimer = setTimeout(() => {
                    setStatus('Playback complete');
                    playing = false;
                }, dur * 1000);
                return;
            }
            const beat = 60 / tempo;
            const dur = beat * 1.2;
            playNote(midiFreq(currentMidi[phase]), actx.currentTime + 0.01, dur);
            playbackTimer = setTimeout(() => stepArp(phase + 1), beat * 1000);
        }

        async function startPlayback() {
            stopAll();
            if (actx.state !== 'running') await actx.resume();
            playing = true;
            setStatus('Listen...');
            if (arpeggiate) {
                stepArp(0);
            } else {
                const now = actx.currentTime + 0.05;
                const dur = (60 / tempo) * 1.8;
                currentMidi.forEach(n => playNote(midiFreq(n), now, dur));
                playbackTimer = setTimeout(() => {
                    setStatus('Playback complete');
                    playing = false;
                }, (dur + 0.1) * 1000);
            }
        }

        // ── Staff SVG ───────────────────────────────────────────────────────────
        function buildChordStaffSVG() {
            const W = 380, H = 130;
            const LS = 12, HS = 6;
            const sTop = 28, sBot = 76;
            const yOf = p => sBot - p * HS;

            const ns = currentScale.sharps;
            const nf = currentScale.flats;
            const keySigX = 52;
            const sigWidth = (ns + nf) * 10;
            const noteX = keySigX + sigWidth + 62;
            const useFlats = currentScale.flats > 0;

            // Build note list with positions
            let noteList = currentMidi.map(midi => {
                const { pos, acc, letter } = midiToStaff(midi, useFlats);
                const displayAcc = resolveAccidental(acc, letter, currentScale);
                return { pos, displayAcc, letter, offsetX: 0 };
            });
            noteList.sort((a, b) => a.pos - b.pos);

            // 2nd collision: shift upper of two adjacent-position notes right
            for (let i = 0; i < noteList.length - 1; i++) {
                if (noteList[i + 1].pos - noteList[i].pos === 1) {
                    noteList[i + 1].offsetX = 14;
                }
            }

            // Stack accidentals into columns (notes sorted low to high)
            const colTopPos = [];
            for (const note of noteList) {
                if (!note.displayAcc) continue;
                let col = 0;
                while (col < colTopPos.length && note.pos - colTopPos[col] < 4) col++;
                colTopPos[col] = note.pos;
                note.accX = noteX - 18 - col * 16;
            }

            // Stem direction from average position
            const avgPos = noteList.reduce((s, n) => s + n.pos, 0) / noteList.length;
            const stemUp = avgPos < 4;
            const bottomPos = noteList[0].pos;
            const topPos = noteList[noteList.length - 1].pos;
            const maxOffX = Math.max(0, ...noteList.map(n => n.offsetX || 0));

            let stemX, stemY1, stemY2;
            if (stemUp) {
                stemX = noteX + maxOffX + 6;
                stemY1 = yOf(bottomPos) - 2;
                stemY2 = yOf(topPos) - 34;
            } else {
                stemX = noteX - 6;
                stemY1 = yOf(topPos) + 2;
                stemY2 = yOf(bottomPos) + 34;
            }

            const svg = [];
            const add = s => svg.push(s);

            add(`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`);
            add(`<rect width="${W}" height="${H}" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>`);

            // Staff lines
            for (let i = 0; i < 5; i++) {
                const y = sTop + i * LS;
                add(`<line x1="28" y1="${y}" x2="${W - 12}" y2="${y}" stroke="#444" stroke-width="1.2"/>`);
            }

            // Treble clef
            add(`<text x="2" y="${sBot + 6}" font-size="72" fill="#222" ` +
                `font-family="'Segoe UI Symbol','FreeSerif','Symbola','Noto Music',serif">&#119070;</text>`);

            // Key signature
            if (ns > 0) {
                for (let i = 0; i < ns; i++) {
                    const x = keySigX + i * 10;
                    const y = yOf(SHARP_SIG_POS[i]);
                    add(`<text x="${x}" y="${y + 7}" font-size="20" font-weight="bold" fill="#111" font-family="serif">&#9839;</text>`);
                }
            } else if (nf > 0) {
                for (let i = 0; i < nf; i++) {
                    const x = keySigX + i * 10;
                    const y = yOf(FLAT_SIG_POS[i]);
                    add(`<text x="${x}" y="${y + 4}" font-size="22" fill="#111" font-family="serif">&#9837;</text>`);
                }
            }

            // Ledger lines (collect unique positions)
            const ledgerSet = new Set();
            for (const note of noteList) {
                if (note.pos <= -2) {
                    for (let k = -2; k >= note.pos; k -= 2) ledgerSet.add(k);
                }
                if (note.pos >= 10) {
                    for (let k = 10; k <= note.pos; k += 2) ledgerSet.add(k);
                }
            }
            const lx1 = noteX - 12, lx2 = noteX + 12 + maxOffX;
            for (const lp of ledgerSet) {
                add(`<line x1="${lx1}" y1="${yOf(lp)}" x2="${lx2}" y2="${yOf(lp)}" stroke="#444" stroke-width="1.2"/>`);
            }

            // Accidentals
            for (const note of noteList) {
                if (!note.displayAcc) continue;
                const ny = yOf(note.pos);
                if (note.displayAcc === '#') {
                    add(`<text x="${note.accX}" y="${ny + 7}" font-size="20" font-weight="bold" fill="#111" font-family="serif">&#9839;</text>`);
                } else if (note.displayAcc === 'b') {
                    add(`<text x="${note.accX}" y="${ny + 4}" font-size="22" fill="#111" font-family="serif">&#9837;</text>`);
                } else if (note.displayAcc === 'n') {
                    add(`<text x="${note.accX}" y="${ny + 7}" font-size="20" fill="#111" font-family="serif">&#9838;</text>`);
                }
            }

            // Note heads
            for (const note of noteList) {
                const nx = noteX + (note.offsetX || 0);
                const ny = yOf(note.pos);
                add(`<ellipse cx="${nx}" cy="${ny}" rx="7" ry="5.5" fill="#111" transform="rotate(-20,${nx},${ny})"/>`);
            }

            // Stem
            add(`<line x1="${stemX}" y1="${stemY1}" x2="${stemX}" y2="${stemY2}" stroke="#111" stroke-width="1.5"/>`);

            add(`</svg>`);
            return svg.join('');
        }

        // ── UI helpers ──────────────────────────────────────────────────────────
        function setStatus(text) { document.getElementById('status').textContent = text; }

        function updateKeyLabel() {
            const el = document.getElementById('key-label');
            const isMulti = selectedScales.size > 1;
            if (!hasStarted && isMulti) {
                el.innerHTML = 'Random Key';
            } else {
                let label = `${currentScale.name} Major`;
                if (isMulti) label += `&nbsp;<span style="color:#555">(Random)</span>`;
                el.innerHTML = label;
            }
        }

        function updateScaleHint() {
            const el = document.getElementById('scale-hint');
            el.textContent = selectedScales.size > 1 ? `${selectedScales.size} keys · random per round` : '';
        }

        function hideAnswer() {
            document.getElementById('answer').style.display = 'none';
            document.getElementById('note-names').style.display = 'none';
            document.getElementById('staff').style.display = 'none';
        }

        function showAnswer() {
            answerShown = true;
            const useFlats = currentScale.flats > 0;
            const ansDiv = document.getElementById('answer');
            const noteNamesDiv = document.getElementById('note-names');

            if (currentChord.size === 2) {
                // Show interval name as the big answer
                ansDiv.textContent = currentChord.name;
                const n0 = midiNoteName(currentMidi[0], useFlats);
                const n1 = midiNoteName(currentMidi[1], useFlats);
                noteNamesDiv.innerHTML = `${n0} &mdash; ${n1}`;
            } else {
                // Show chord symbol (root + quality abbreviation)
                const rootName = midiNoteName(currentRootMidi, useFlats);
                ansDiv.innerHTML = rootName + currentChord.abbr;
                const noteNames = currentMidi.map(m => midiNoteName(m, useFlats)).join('&nbsp;&nbsp;');
                const invLabels = ['', ' (1st inv.)', ' (2nd inv.)', ' (3rd inv.)', ' (4th inv.)'];
                const invLabel = invLabels[currentInversion] || ` (inv. ${currentInversion})`;
                noteNamesDiv.innerHTML = noteNames +
                    (currentInversion > 0 ? `&nbsp;&nbsp;<span style="color:#4a6a9a;font-size:0.85em">${invLabel}</span>` : '');
            }

            ansDiv.style.display = 'block';
            noteNamesDiv.style.display = 'block';
            const staffDiv = document.getElementById('staff');
            staffDiv.innerHTML = buildChordStaffSVG();
            staffDiv.style.display = 'block';
            setStatus('Answer');
        }

        // ── Quiz flow ───────────────────────────────────────────────────────────
        async function advance() {
            if (!hasStarted) {
                if (!pickChord()) { setStatus('No chords selected'); return; }
                hasStarted = true;
                answerShown = false;
                hideAnswer();
                updateKeyLabel();
                await startPlayback();
                return;
            }
            if (answerShown) {
                if (!pickChord()) { setStatus('No chords selected'); return; }
                answerShown = false;
                hideAnswer();
                updateKeyLabel();
                await startPlayback();
            } else {
                showAnswer();
            }
        }

        async function replay() {
            if (!hasStarted) { await advance(); return; }
            await startPlayback();
        }

        // ── Keyboard ────────────────────────────────────────────────────────────
        document.addEventListener('keydown', e => {
            if (actx.state === 'suspended') actx.resume();
            const settingsOpen = document.getElementById('settings-panel').style.display === 'block';
            if (settingsOpen) { if (e.key === 'Escape') closeSettings(); return; }
            if (e.key === 'ArrowLeft') replay();
            else if (e.key === 'ArrowRight') advance();
        });

        document.getElementById('btn-replay').addEventListener('click', e => { e.currentTarget.blur(); replay(); });
        document.getElementById('btn-advance').addEventListener('click', e => { e.currentTarget.blur(); advance(); });

        // ── Settings panel ──────────────────────────────────────────────────────
        function openSettings() {
            document.getElementById('settings-panel').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }
        function closeSettings() {
            document.getElementById('settings-panel').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        document.getElementById('settings-btn').addEventListener('click', openSettings);
        document.getElementById('close-btn').addEventListener('click', closeSettings);
        document.getElementById('overlay').addEventListener('click', closeSettings);

        function refreshTypeRows() {
            document.querySelectorAll('.chord-type-row').forEach(row => {
                const sz = parseInt(row.dataset.forSize);
                row.classList.toggle('size-active', selectedSizes.has(sz));
            });
        }

        // Size toggle buttons (multi-select, keep at least one)
        document.getElementById('size-btns').addEventListener('click', e => {
            const btn = e.target.closest('[data-size]');
            if (!btn) return;
            const sz = parseInt(btn.dataset.size);
            if (selectedSizes.has(sz)) {
                if (selectedSizes.size === 1) return;
                selectedSizes.delete(sz);
                btn.classList.remove('on');
                CHORDS.filter(c => c.size === sz).forEach(c => selectedChords.delete(c));
                // Safety: ensure at least one chord remains
                if (selectedChords.size === 0) {
                    for (const s of selectedSizes) {
                        CHORDS.filter(c => c.size === s).forEach(c => selectedChords.add(c));
                    }
                    rebuildTypePills();
                }
            } else {
                selectedSizes.add(sz);
                btn.classList.add('on');
                CHORDS.filter(c => c.size === sz).forEach(c => selectedChords.add(c));
                document.querySelectorAll(`#types-${sz} [data-chord]`).forEach(b => b.classList.add('on'));
            }
            refreshTypeRows();
        });

        // Individual chord type toggle (keep at least one total)
        document.querySelectorAll('[data-chord]').forEach(btn => {
            btn.addEventListener('click', () => {
                const chord = CHORDS.find(c => c.name === btn.dataset.chord);
                if (!chord) return;
                if (selectedChords.has(chord)) {
                    if (selectedChords.size === 1) return;
                    selectedChords.delete(chord);
                    btn.classList.remove('on');
                } else {
                    selectedChords.add(chord);
                    btn.classList.add('on');
                }
            });
        });

        function rebuildTypePills() {
            document.querySelectorAll('[data-chord]').forEach(btn => {
                const chord = CHORDS.find(c => c.name === btn.dataset.chord);
                if (chord) btn.classList.toggle('on', selectedChords.has(chord));
            });
        }

        // Voicing toggle (mutually exclusive)
        document.getElementById('inv-btns').addEventListener('click', e => {
            const btn = e.target.closest('[data-inv]');
            if (!btn) return;
            withInversions = btn.dataset.inv === 'inv';
            document.querySelectorAll('#inv-btns .pill').forEach(b => b.classList.toggle('on', b === btn));
        });

        // Playback toggle (mutually exclusive)
        document.getElementById('play-btns').addEventListener('click', e => {
            const btn = e.target.closest('[data-play]');
            if (!btn) return;
            arpeggiate = btn.dataset.play === 'arp';
            document.querySelectorAll('#play-btns .pill').forEach(b => b.classList.toggle('on', b === btn));
        });

        // Scale grid (verbatim from ear_trainer)
        const grid = document.getElementById('scale-grid');
        const scaleBtns = new Map();
        SCALES.forEach((scale, i) => {
            const btn = document.createElement('button');
            btn.className = 'pill' + (i === 0 ? ' on' : '');
            btn.innerHTML = scale.name;
            btn.addEventListener('click', () => {
                if (selectedScales.has(scale)) {
                    if (selectedScales.size === 1) return;
                    selectedScales.delete(scale);
                    btn.classList.remove('on');
                } else {
                    selectedScales.add(scale);
                    btn.classList.add('on');
                }
                updateScaleHint();
                updateKeyLabel();
            });
            grid.appendChild(btn);
            scaleBtns.set(scale, btn);
        });

        document.getElementById('select-all-btn').addEventListener('click', () => {
            SCALES.forEach(s => { selectedScales.add(s); scaleBtns.get(s).classList.add('on'); });
            updateScaleHint(); updateKeyLabel();
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            selectedScales.clear();
            selectedScales.add(SCALES[0]);
            scaleBtns.forEach((btn, scale) => btn.classList.toggle('on', scale === SCALES[0]));
            updateScaleHint(); updateKeyLabel();
        });

        // ── Tempo knob (verbatim from ear_trainer) ──────────────────────────────
        function updateKnob() {
            const t = Math.round(tempo);
            document.getElementById('tempo-bpm').textContent = t;
            const ratio = (t - TEMPO_MIN) / (TEMPO_MAX - TEMPO_MIN);
            document.getElementById('knob-fill').setAttribute('stroke-dasharray',
                `${(ratio * KNOB_ARC).toFixed(2)} ${KNOB_CIRC}`);
            document.getElementById('knob-indicator').setAttribute('transform',
                `rotate(${(-135 + ratio * 270).toFixed(1)})`);
        }

        const knobEl = document.getElementById('tempo-knob');
        let knobDragging = false, knobLastAngle = 0;

        function knobAngle(e) {
            const r = knobEl.getBoundingClientRect();
            const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
            const px = e.touches ? e.touches[0].clientX : e.clientX;
            const py = e.touches ? e.touches[0].clientY : e.clientY;
            return Math.atan2(py - cy, px - cx) * 180 / Math.PI;
        }
        function applyKnobDelta(e) {
            const a = knobAngle(e);
            let d = a - knobLastAngle;
            if (d > 180) d -= 360;
            if (d < -180) d += 360;
            knobLastAngle = a;
            tempo = Math.max(TEMPO_MIN, Math.min(TEMPO_MAX, tempo + d * (TEMPO_MAX - TEMPO_MIN) / 270));
            updateKnob();
        }

        knobEl.addEventListener('mousedown', e => {
            knobDragging = true; knobLastAngle = knobAngle(e);
            knobEl.style.cursor = 'grabbing'; e.preventDefault();
        });
        knobEl.addEventListener('touchstart', e => {
            knobDragging = true; knobLastAngle = knobAngle(e); e.preventDefault();
        }, { passive: false });
        document.addEventListener('mousemove', e => { if (knobDragging) applyKnobDelta(e); });
        document.addEventListener('touchmove', e => { if (knobDragging) applyKnobDelta(e); }, { passive: false });
        document.addEventListener('mouseup', () => { knobDragging = false; knobEl.style.cursor = 'grab'; });
        document.addEventListener('touchend', () => { knobDragging = false; });
        knobEl.addEventListener('wheel', e => {
            e.preventDefault();
            tempo = Math.max(TEMPO_MIN, Math.min(TEMPO_MAX, tempo - Math.sign(e.deltaY) * 2));
            updateKnob();
        }, { passive: false });

        // ── Init ────────────────────────────────────────────────────────────────
        CHORDS.filter(c => c.size === 3).forEach(c => selectedChords.add(c));
        updateKnob();
        updateKeyLabel();

        // ── MIDI Piano ──────────────────────────────────────────────────────────
        const midiGain = actx.createGain();
        midiGain.gain.value = 0.6;
        midiGain.connect(actx.destination);
        const midiNotes = {};

        function midiNoteOn(note, vel) {
            if (actx.state === 'suspended') actx.resume();
            if (midiNotes[note]) return;
            const freq = 440 * Math.pow(2, (note - 69) / 12);
            const osc = actx.createOscillator();
            const g = actx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = freq;
            osc.connect(g); g.connect(midiGain);
            const now = actx.currentTime;
            const peak = (vel / 127) * 0.7;
            g.gain.setValueAtTime(0, now);
            g.gain.linearRampToValueAtTime(peak, now + 0.008);
            osc.start(now);
            midiNotes[note] = { osc, g };
        }

        function midiNoteOff(note) {
            const n = midiNotes[note];
            if (!n) return;
            const now = actx.currentTime;
            n.g.gain.cancelScheduledValues(now);
            n.g.gain.setValueAtTime(n.g.gain.value, now);
            n.g.gain.linearRampToValueAtTime(0, now + 0.4);
            n.osc.stop(now + 0.41);
            delete midiNotes[note];
        }

        function onMidiMsg(e) {
            const [cmd, note, vel] = e.data;
            if (cmd === 144 && vel > 0) midiNoteOn(note, vel);
            else if (cmd === 128 || (cmd === 144 && vel === 0)) midiNoteOff(note);
        }

        function connectMidi(access) {
            const el = document.getElementById('midi-status');
            const ins = [...access.inputs.values()];
            ins.forEach(i => { i.onmidimessage = onMidiMsg; });
            el.textContent = ins.length ? 'MIDI: connected' : 'MIDI: no device';
            el.className = ins.length ? 'on' : '';
            access.onstatechange = () => {
                const ins2 = [...access.inputs.values()];
                ins2.forEach(i => { i.onmidimessage = onMidiMsg; });
                el.textContent = ins2.length ? 'MIDI: connected' : 'MIDI: no device';
                el.className = ins2.length ? 'on' : '';
            };
        }

        if (navigator.requestMIDIAccess) {
            document.getElementById('midi-status').textContent = 'MIDI: searching\u2026';
            navigator.requestMIDIAccess().then(connectMidi, () => {
                const el = document.getElementById('midi-status');
                el.textContent = 'MIDI: denied'; el.className = 'err';
            });
        }
    </script>
</body>

</html>
